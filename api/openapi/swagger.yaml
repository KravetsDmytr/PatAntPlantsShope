basePath: /api/v1
definitions:
  models.APIResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
    type: object
  models.AddToCartRequest:
    properties:
      product_id:
        type: integer
      quantity:
        type: integer
    type: object
  models.LoginRequest:
    properties:
      login:
        type: string
      password:
        type: string
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      login:
        type: string
      password:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API для магазину товарів для тварин та рослин.
  title: Pet & Plant Store API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Виконує вхід користувача та повертає JWT токен
      parameters:
      - description: Облікові дані
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Авторизація користувача
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Створює нового користувача в системі
      parameters:
      - description: Дані користувача
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Реєстрація користувача
      tags:
      - Auth
  /cart:
    get:
      description: Повертає вміст кошика авторизованого користувача
      parameters:
      - description: Bearer JWT токен
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: Отримати кошик
      tags:
      - Cart
  /cart/items:
    post:
      consumes:
      - application/json
      description: Додає товар у кошик авторизованого користувача
      parameters:
      - description: Bearer JWT токен
        in: header
        name: Authorization
        required: true
        type: string
      - description: Товар і кількість
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddToCartRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - ApiKeyAuth: []
      summary: Додати товар у кошик
      tags:
      - Cart
  /categories:
    get:
      description: Повертає список категорій товарів
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Отримати категорії
      tags:
      - Categories
  /products:
    get:
      description: Повертає товари з фільтрацією за категорією, вартістю та пошуковим
        запитом
      parameters:
      - description: ID категорії
        in: query
        name: category_id
        type: integer
      - description: Мінімальна вартість
        in: query
        name: min_cost
        type: number
      - description: Максимальна вартість
        in: query
        name: max_cost
        type: number
      - description: Пошуковий запит
        in: query
        name: q
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Отримати список товарів
      tags:
      - Products
  /products/{id}:
    get:
      description: Повертає детальну інформацію про товар
      parameters:
      - description: ID товару
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Отримати товар за ID
      tags:
      - Products
schemes:
- http
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
